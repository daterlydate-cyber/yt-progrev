name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile --windowed --name "YT-Progrev" `
            --collect-all selenium `
            --collect-all undetected_chromedriver `
            --hidden-import=selenium.webdriver.common.action_chains `
            --hidden-import=selenium.webdriver.common.by `
            --hidden-import=selenium.webdriver.common.keys `
            --hidden-import=selenium.webdriver.common.options `
            --hidden-import=selenium.webdriver.common.service `
            --hidden-import=selenium.webdriver.common.desired_capabilities `
            --hidden-import=selenium.webdriver.common.proxy `
            --hidden-import=selenium.webdriver.common.timeouts `
            --hidden-import=selenium.webdriver.common.utils `
            --hidden-import=selenium.webdriver.support.expected_conditions `
            --hidden-import=selenium.webdriver.support.wait `
            --hidden-import=selenium.webdriver.support.ui `
            --hidden-import=selenium.webdriver.support.select `
            --hidden-import=selenium.webdriver.chrome.service `
            --hidden-import=selenium.webdriver.chrome.webdriver `
            --hidden-import=selenium.webdriver.chrome.options `
            --hidden-import=selenium.common.exceptions `
            --hidden-import=undetected_chromedriver `
            --hidden-import=fake_useragent `
            --hidden-import=schedule `
            --hidden-import=dotenv `
            main.py

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=$version installer.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/YT-Progrev.exe
            Output/YT-Progrev-Setup.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
